<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01_if</title>
</head>
<body>
    <h1>01_if</h1>
    <script>
        /* 
        if(조건){
            // 조건이 true 일 때 실행
        }
        */
        if(false){
            document.write("if 참참참 1 <br/>")
            document.write("if 참참참 1 <br/>")
            document.write("if 참참참 1 <br/>")
            document.write("if 참참참 1 <br/>")
        }

        document.write("if 종료 ---- 1 <br/>")

        
        if(false) // {} 없을 경우 if 바로 다음 명령문 1개만 종속
                  // 실행 명령문이 없으면 에러 발생
                document.write("if 참참참 2 <br/>")

            document.write("if 참참참 2 <br/>")
            document.write("if 참참참 2 <br/>")
            document.write("if 참참참 2 <br/>")
        

        document.write("if 종료 ---- 2 <br/>")

        
        if(false){
        }

        document.write("if 종료 ---- 3 <br/>")

        //if(false) 실행 구문이 없으면 에러 발생

        if(true){
            var aa = 10
            let dd = 1000   // 내부변수 / 지역변수 - 선언된 구간에서만 사용가능
            document.write(`if 참참참 4 ${aa} ${dd} <br/>`)
            
        }

        // document.write(`if 종료 ---- 4 ${aa} ${dd} <br/>`)
        // 선언된 구간을 벗어나 dd 소멸
        document.write(`if 종료 ---- 4 ${aa} <br/>`)

        var x = false
        if(x){
            var bb = 20
            document.write(`if 참참참 5 ${bb} <br/>`)

        }
        document.write(`if 종료 ---- 5 ${bb} <br/>`)


        if(true){   //머리
            document.write("if ~ else 참참참 1 <br/>")
        }else{      //꼬리
            document.write("if ~ else 거지 1 <br/>")
        }

        document.write("if ~ else 종료 ---- 1 <br/>")
        
        /*
        else : if 문 종속이며 순서는 마지막
        else{
            document.write("if ~ else 거지 2 <br/>")
        }if(true){
            document.write("if ~ else 참참참 2 <br/>")
        }

        document.write("if ~ else 종료 ---- 2 <br/>")
        */

        var jum = 68
        if(jum >= 80){
            document.write("우수 <br/>")
        }
        if(jum >= 60){
            document.write("양호 <br/>")
        }else{
            document.write("미달 <br/>")

        }

        document.write("if ~ else 종료 ---- 2 <br/>")

        if(jum >= 80){
            document.write("우수2 <br/>")
        }
        else if(jum >= 60){
            document.write("양호2 <br/>")
                if(jum % 2 == 0){           // 중첩 if문 / 중첩 제어문 - 제어문 안에 제어문
                document.write("짝수 <br/>")
                }else{
                document.write("홀수 <br/>")
                }
        }else if(jum >= 40){
            document.write("아쉽2 <br/>")
        }else{
            document.write("미달2 <br/>")

        }

        document.write("if ~ else if ~ else 종료 ---- 1 <br/>")
        // 좁은 영역에서 부터 차례대로 분기

        //else if : if 종속 필수 - if ~else if ~else 순서 변경 불가
        if(jum >= 80){                  //머리
            document.write("우수3 <br/>")
        }else if(jum >= 40){            //몸
            document.write("아쉽3 <br/>")
        }
        else if(jum >= 60){             //몸
            document.write("양호3 <br/>")
        }else{                          //꼬리
            document.write("미달3 <br/>")

        }

        document.write("if ~ else if ~ else 종료 ---- 2 <br/>")
        /*
        else if(jum >= 40){
            document.write("아쉽3 <br/>")
        }
        else if(jum >= 60){
            document.write("양호3 <br/>")
        }if(jum >= 80){
            document.write("우수3 <br/>")
        }else{
            document.write("미달3 <br/>")

        }

        document.write("if ~ else if ~ else 종료 ---- 2 <br/>")
        */
    </script>
</body>
</html>
