<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06_forfor</title>
</head>
<body>
    <h1>06_forfor</h1>
    <script>
        for (let h = 1; h <= 12; h++) {
            document.write(`<h3>${h}시</h3>`)
            for(let m = 1; m <=60; m++){
                document.write(`${h} : ${m}<br/>`)

            }

            // document.write(`${h} : ${m}<br/>`)
            
        }
    </script>
</body>
</html>
