<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>05_forVar</title>
</head>
<body>
    <h1>05_forVar</h1>
    <script>
        /*

        for(let i= 0; i<5;){

        for(let i =0; ; i++){

        let b = 20
        // let b = 30       let 중첩 선언 불가

        const c = 40
        // const c = 50     const 중첩선언 불가

        var d = 60
        var d = 70          // 중첩선언 가능
       
        for(let i = 10; i <= 30; i+=10){
            let a = 10          // 반복문 내 지역변수 = 1회 반복마다 소멸 및 선언
            a += 2
            var e = 1000    // 반복마다 선언됨
            e += 2          // 누적증가 하지 않음
            document.write(`${i}, ${a}, ${e} <br/>`)
        }

        // document.write(`${a}<br/>`)      내부 지역변수 호출 불가
        // document.write(`${i}<br/>`)      반복 변수 i 호출 불가 


        document.write(`반복문 종료 1 : ${e} <br/>`)    //var 가 전역이므로 호출 가능
        document.write(`<hr/>`)

        //반복 변수를 var(전역)으로 선언
        for(var j = 10; j<= 30; j+=10){
            document.write(`${j} <br/>`)
        }
        document.write(`반복문 종료 2 : ${j} <br/>`)    //var 호출 가능
        document.write(`<hr/>`)

        let k = 10
        let m = 100
        for(; k<= 30; k+=10){   //외부에서 선언된 지역변수 k 반복변수로 사용
            m += 1               //외부변수
            document.write(`${k}, ${m} <br/>`)

        }
        document.write(`반복문 종료 3 : ${k} <br/>`)    //var 호출 가능
        document.write(`<hr/>`)

    </script>
</body>
