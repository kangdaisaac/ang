<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14_for_work</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .wrapper{
            width: 700px;
            margin: 30px auto;
            border: 1px solid #333;
        }

        .imgBox{
            width: 100%;
            height: 100%;
        }

        .imgBox img{
            width: 100%;
            height: 100%;
        }

        .title{
            text-align: center;
            padding: 20px 0;
            font-size: 32px;
        }

        .calendar{
            width: 630px;
            margin: 0 auto 30px;
            overflow: hidden;
        }

        .box{
            width: 90px;
            height: 90px;
            border: 1px solid #999;
            float: left;
            text-align: center;
            line-height: 90px;
            font-size: 20px;
        }

        .day{
            height: 50px;
            line-height: 50px;
            background-color: #eee;
            font-weight: bold;
        }

        .red{
            color: #f00;
        }

        .blue{
            color: #00f;
        }

        .yellow{
            background-color: #ff0;
        }
    </style>
</head>
<body>
    <h1>14_for_work</h1>
    <div class="wrapper">
        <div class="imgBox">
            <img src="../fff/Sea wave.webp" alt="">
        </div>

        <h2 class="title">2026년 4월</h2>

        <div class="calendar">
            <div class="box day red">일</div>
            <div class="box day">월</div>
            <div class="box day">화</div>
            <div class="box day">수</div>
            <div class="box day">목</div>
            <div class="box day">금</div>
            <div class="box day blue">토</div>

            <script>
                var start = 3;
                var lastDate = 30;
                var date = 1;
                var week = 5;

                for(var i = 0; i < week; i++){
                    for(var j = 0; j < 7; j++){
                        var num = i * 7 + j;

                        if(num < start || date > lastDate){
                            document.write('<div class="box"></div>');
                        }else{
                            if(j == 0){
                                if(date == 8){
                                    document.write('<div class="box red yellow">' + date + '</div>');
                                }else{
                                    document.write('<div class="box red">' + date + '</div>');
                                }
                            }else if(j == 6){
                                if(date == 8){
                                    document.write('<div class="box blue yellow">' + date + '</div>');
                                }else{
                                    document.write('<div class="box blue">' + date + '</div>');
                                }
                            }else{
                                if(date == 8){
                                    document.write('<div class="box yellow">' + date + '</div>');
                                }else{
                                    document.write('<div class="box">' + date + '</div>');
                                }
                            }

                            date++;
                        }
                    }
                }
            </script>
        </div>
    </div>
</body>
</html>
