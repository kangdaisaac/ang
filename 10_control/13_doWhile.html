<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13_doWhile</title>
</head>
<body>
    <h1>13_doWhile</h1> <!-- 사실 잘 안씀 -->
    <script>
        let i = 10
        while(i<5){     // 조건에 맞지 않으면 실행 불가
            document.write(`while ${i} <br/>`)
            i++
        }
        document.write(`while 종료 -------------<br/>`)
        
        i = 10
        do{
            document.write(`while ${i} <br/>`)
            i++
        }while(i<5)     // 조건에 맞지 않아도 최초 1회 실행
        document.write(`do ~ while 종료 -------------<br/>`)

    </script>
</body>
</html>
