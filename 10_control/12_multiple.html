<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12_multiple</title>
</head>
<body>
    <h1>12_multiple</h1>

    <script>
        let ttt;
        let sum = 0;
        let mul = 1;

        while(true){
            ttt = prompt("숫자 입력 (x 입력시 종료)")
            
            if(ttt == "x"){
                break;
            }
        
            let num = Number(ttt);
            document.write(`${num} <br/>`);
        
            if(num % 2 == 0){
                sum += num;
            }
            if(num % 3 == 0){
                mul *= num;
            }
        }

        document.write(`2의 배수 합 : ${sum} <br/>`);
        document.write(`3의 배수 곱 : ${mul} <br/>`);
        
        
    </script>
</body>
</html>
