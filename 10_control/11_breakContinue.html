<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11_breakContinue</title>
</head>
<body>
    <h1>11_breakContinue</h1>
    <script>
        for (let i = 0; i < 10; i++){
            document.write(`for 시작${i} <br/>`)
            if(i == 4){
                break       // 제어문 탈출 -- 구간 중간 탈출 가능
            }
            document.write(`for 끝${i} <br/>`)
        }

        document.write(`break 종료 ------------ <br/>`)
        
        for (let i = 0; i < 10; i++){
            document.write(`for 시작${i} <br/>`)
            if(i == 4){
                continue       // 이하 구문 실행하지 않고 반복문 상위 이동
            }
            document.write(`for 끝${i} <br/>`)
        }

        document.write(`continue 종료 ------------ <br/>`)

        for (let i = 0; i < 10; i++){
            document.write(`for 시작${i} <br/>`)
            if(i != 4){
                document.write(`for 끝${i} <br/>`)
            }
        }

        document.write(`if 종료 ------------ <br/>`)

    </script>
</body>
</html>
