        let ttt
        let tot = 0

        while(true){
            ttt = prompt("숫자 입력 (x 입력시 종료)")
            document.write(`${ttt} <br/>`)
            if(ttt == "x"){
                break
            }
            tot += eval(ttt)
        }
        document.write(`tot :${tot} <br/>`)
