<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02_pacMan</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            background-color: #333;
        }
        wrapper{
            display: block;
            position: relative;
            width: 600px;
            height: 400px;
            border: 2px solid #ccc;
            margin: 0 auto;
        }
        .box{
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff0;
            left: 300px;
            top: 200px;
        }
        
        .me{
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: #faf;
            left: 50px;
            top: 50px
        }
    </style>
    <script>

        var me
        window.onload=function(){
            var box = document.querySelector(".box")
            box.xx = 300
            box.yy = 200

            box.dx = 2
            box.dy = 2

            me = document.querySelector(".me")
            me.xx = 50
            me.yy = 50

            function boxMove(){
                box.xx += box.dx
                box.yy += box.dy

                if(box.yy > 400-100 || box.yy < 0){
                    box.dy *= -1
                }

                if(box.xx > 600-100 || box.xx < 0){
                    box.dx *= -1
                }

                box.style.left = box.xx+"px"
                box.style.top = box.yy+"px"
            }
            // boxMove()
            timer = setInterval(boxMove, 30)
        }

        window.onkeydown=function(e){
            console.log(e.keyCode) 
            /*   38
               37  39
                 40
            */
           switch(e.keyCode){
                case 39:
                    me.xx += 5
                    break
           }
           switch(e.keyCode){
                case 37:
                    me.xx += -5
                    break
           }
           switch(e.keyCode){
                case 40:
                    me.yy += 5
                    break
           }
           switch(e.keyCode){
                case 38:
                    me.yy -= 5
                    break
           }

            me.style.left= me.xx+"px"
            me.style.top= me.yy+"px"
            
            if(me.xx < 0){
                me.xx = 0
            }
            if(me.xx > 600-50){
                me.xx = 600-50
            }
            if(me.yy < 0){
                me.yy = 0
            }
            if(me.yy > 400-50){
                me.yy = 400-50
            }

    }
    </script>
</head>
<body>
    <h1>02_pacMan</h1>
    <wrapper>
        <div class="box"></div>
        <div class="me"></div>
    </wrapper>
</body>
</html>
