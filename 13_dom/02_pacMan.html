<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02_pacMan</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            background-color: #333;
        }
        wrapper{
            display: block;
            position: relative;
            width: 600px;
            height: 400px;
            border: 2px solid #ccc;
            margin: 0 auto;
        }
        .box{
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff0;
            left: 300px;
            top: 200px;
        }
    </style>
    <script>
        window.onload=function(){
            var box = document.querySelector(".box")
            box.xx = 300
            box.yy = 200

            box.dx = 2
            box.dy = 2

            function boxMove(){
                box.xx += box.dx
                box.yy += box.dy

                if(box.yy > 400-100 || box.yy < 0){
                    box.dy *= -1
                }

                if(box.xx > 600-100 || box.xx < 0){
                    box.dx *= -1
                }

                box.style.left = box.xx+"px"
                box.style.top = box.yy+"px"
            }
            // boxMove()
            timer = setInterval(boxMove, 30)
        }
    </script>
</head>
<body>
    <h1>02_pacMan</h1>
    <wrapper>
        <div class="box"></div>
    </wrapper>
</body>
</html>
