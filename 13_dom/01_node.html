<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01_node</title>
    <style>
        #cons{
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
        }
        .qaz{
            background-color: #ffa;
        }
        .wsx{
            color: #faa;
        }
        .edc{
            text-decoration: underline;
        }
    </style>
    <script>
        function conMsg(msg){
            let cons = document.getElementById("cons")
            // console.log(cons)
            cons.innerHTML += `${msg} <br/>`
        }
            
        window.onload = function(){ // html 로드 후 실행하는 이벤트 함수
            // alert("로드 후 실행")


            // conMsg("고라고라")
            // conMsg("파덕파덕")
            // 전체
            let rrtt = document.documentElement
            //cosole.log(rrtt)

            let spans = document.getElementsByTagName("span")
            console.log(spans)
            console.log(spans[1])
            conMsg(spans[1].innerHTML)   // innerHTML : <span>span1</span> text 노드 : span1
            spans[0].innerHTML = "스팬0"

            let bbbs = document.getElementsByClassName("bbb")
            //스타일변경
            bbbs[1].style.border = "3px solid #f00"
            //속성변경
            bbbs[2].setAttribute("id", "b2")
            conMsg(spans[0].getAttribute("zz-data"))

            let b2 = document.getElementById("b2")
            conMsg(b2.innerHTML)
            
            spans[0].className="qaz" //클래스적용
            spans[0].className="wsx" //클래스변경 - 기존의 클래스 삭제
            spans[0].setAttribute("class", "edc") //클래스변경 - 기존의 클래스 삭제
            //위 3개가 같은 개념
            spans[0].removeAttribute("class")  // 속성 삭제
            spans[0].removeAttribute("zz-data")// 속성 삭제
            spans[0].classList.add("qaz")      // 클래스 추가
            spans[0].classList.add("wsx")
            spans[0].classList.add("edc")
            spans[0].classList.toggle("qaz")   // 있으면 삭제, 없으면 추가
            conMsg(spans[0].classList.contains("qaz"))
            spans[0].classList.toggle("qaz")   // 있으면 삭제, 없으면 추가
            conMsg(spans[0].classList.contains("qaz"))

            // css 선택자 사용
            let q11 = document.querySelector("#q1")
            conMsg(q11.innerHTML)
            
            // 여러개인 경우 첫 1개 리턴
            let bbb = document.querySelector(".bbb")
            conMsg(bbb.innerHTML)

            // 배열로 리턴 - 1개도 배열
            let bbbArr = document.querySelectorAll(".bbb")
            console.log(bbbArr)
            conMsg(bbbArr[0].innerHTML)
            conMsg(bbbArr[1].innerHTML)
            conMsg(bbbArr[2].innerHTML)

        }
    </script>
</head>
<body>
    <h1>01_node</h1>
    <div class="aaa">
        aaa0
        <div class="bbb" id="b0">bbb0</div>
        <div qwer="11" id="q1">qwer11</div>
        <div qwer="11" id="q1" class="bbb">qwer11 bbb1</div>
        <span zz-data="1234">span0</span>
        <span>span1</span>
        <div class="bbb">bbb2</div>
    </div>

    <div id="cons"></div>

    <script>
        // let cons = document.getElementById("cons")
        // console.log(cons)
        // cons.innerHTML = "메시지"
    </script>

</body>
</html>
