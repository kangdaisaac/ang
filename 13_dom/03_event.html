<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03_event</title>
    <style>
        section{
            width: 800px;
            height: 400px;
            background-color: #ffa;
        }

        section > div{
            width: 100px;
            height: 70px;
            margin: 5px;
            padding: 5px;
            border: 1px solid #ccc;
            float: left;
        }

        section > div > img{
            width: 100px;
            height: 70px;
            margin: 5px;
            padding: 5px;
            border: 1px solid #ccc;
        }

        footer{
            width: 200px;
            height: 150px;
            border: 1px solid #ccc;
            overflow: auto;
        }

        hr{
            clear: both;
        }
    </style>
    <script>
        window.onload=function(){
            //2. 이벤트리스너방식 (java GUI 처리와 같음)
            let dd2 = document.querySelector("section > div:nth-of-type(2)")

            dd2.addEventListener('click', function(){
                console.log(`dd2 click`)
            })
            
            //3. dom 이벤트 핸들러 방식 (가장 많이 사용)
            let dd3 = document.querySelector("section > div:nth-of-type(3)")
            dd3.onclick = function(){
                console.log(`dd3 click`)
            }
            
            document.querySelector("section > div:nth-of-type(4)")
            .onmouseover = function(e){
                //e.clientX, e.clientY 들어올때 마우스 위치
                console.log(`onmouseover!${e.clientX}, ${e.clientY}`)
            }
            
            document.querySelector("section > div:nth-of-type(5)")
            .onmouseout = function(e){
                //e.clientX, e.clientY 들어올때 마우스 위치
                console.log(`onmouseout!${e.clientX}, ${e.clientY}`)
            }
            
            document.querySelector("section > div:nth-of-type(6)")
            .onmousemove = function(e){
                //e.clientX, e.clientY 들어올때 마우스 위치
                console.log(`onmousemove!${e.clientX}, ${e.clientY}`)
            }
            
            document.querySelector("section > div:nth-of-type(7)")
            .onmousedown = function(e){
                //e.clientX, e.clientY 들어올때 마우스 위치
                console.log(`onmousedown!${e.clientX}, ${e.clientY}`)
            }

            document.querySelector("section > div:nth-of-type(8)")
            .onmouseup = function(e){
                //e.clientX, e.clientY 들어올때 마우스 위치
                console.log(`onmouseup!${e.clientX}, ${e.clientY}`)
            }
            
            document.querySelector("section > div:nth-of-type(9)")
            .ondblclick = function(e){
                //e.clientX, e.clientY 들어올때 마우스 위치
                console.log(`ondblclick!${e.clientX}, ${e.clientY}`)
            }
            
            document.querySelector("section > div:nth-of-type(10)")
            .onwheel = function(e){
                //e.clientX, e.clientY 들어올때 마우스 위치
                // console.log(`onwheel!${e.clientX}, ${e.clientY}`)
                console.log(`onwheel!${e.deltaY}`)  // 휠 방향만 + , -
            }
            
            document.querySelector("input:nth-of-type(1)")
            .onfocus = function(e){
                console.log(`focus!`) 
            }
            
            document.querySelector("input:nth-of-type(2)")
            .onblur = function(e){
                console.log(`blur!`) 
            }
            
            document.querySelector("input:nth-of-type(3)")
            .onkeydown = function(e){
                console.log(`keydown! ${e.keyCode}`) 
            }
            
            document.querySelector("input:nth-of-type(4)")
            .onkeyup = function(e){
                console.log(`keyup!  ${e.keyCode}` ) 
            }
            
            document.querySelector("input:nth-of-type(5)")
            .onkeypress = function(e){
                console.log(`keypress!  ${e.keyCode}` ) //한글 작동 안함
            }

            
            document.querySelector("select")
            .onchange = function(){     // this : 객체 자신
                console.log(`select-change!  ${this.value}` )
            }
            
            //배열이기에 직접 이벤트 불가
            /*
            document.querySelectorAll("input[type=radio]")
            .onchange = function(){     // this : 객체 자신
                console.log(`radio-change!  ${this.value}` )
            }*/

            // 배열의 각 원소 이벤트 설정
            for (const rr of document.querySelectorAll("input[type=radio]")) {
                rr.onchange = function(){     // this : 객체 자신
                console.log(`radio-change!  ${this.value}` )
                }
            }
            document.querySelector("footer")
            .onscroll= function(){    
                console.log(`scroll!  ${this.scrollTop}, ${this. scrollHeight},
                ${this. scrollLeft}, ${this. scrollWidth}` )
            }
            
            window.onresize=function(){
                console.log(`resize!  ${this.innerWidth}, ${this.innerHeight}` )
            }
        }



        
    </script>
</head>
<body>
    <h1>03_event</h1>
    <section>
        <div>
            <!-- 1. 태그에 직접입력 : 태그 속성에 onclick="alert('빵') -->
            <img src="../fff/다운로드 (5).jpg" alt="" onclick="alert('빵')">
        </div>
        <div>
            <img src="../fff/다운로드 (6).jpg" alt="">
        </div>
        <div>
            <img src="../fff/다운로드 (7).jpg" alt="">
        </div>
        <div>
            <img src="../fff/다운로드 (8).jpg" alt="">
        </div>
        <div>
            <img src="../fff/images (6).jpg" alt="">
        </div>
        <div>
            <img src="../fff/다운로드 (11).jpg" alt="">
        </div>
        <div>
            <img src="../fff/images (3).jpg" alt="">
        </div>
        <div>
            <img src="../fff/images (4).jpg" alt="">
        </div>
        <div>
            <img src="../fff/images (7).jpg" alt="">
        </div>
        <div>
            <img src="../fff/images (5).jpg" alt="">
        </div>

        <hr/>
        <input type="text">
        <input type="text">
        <input type="text">
        <input type="text">
        <input type="text">
        <hr/>
        <select name="" id="">
            <option >도라에몽</option>
            <option >노진구</option>
            <option >퉁퉁이</option>
            <option >비실이</option>
            <option >이슬이</option>
            <option >퉁순이</option>
        </select>

        <input type="radio" name="gender" value="m">남자
        <input type="radio" name="gender" value="f">여자
        <input type="radio" name="gender" value="tank">탱크
    </section>
    <footer>
        <img src="../fff/images (8).jpg" alt="">
    </footer>
</body>
</html>
