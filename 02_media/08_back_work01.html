<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>08_back_work01</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
       
        .one{
            width: 300px;
            height: 200px;
            background: url(../fff/Ro0Ock.avif);
            background-size: 300px 200px;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .zoom{
            width: 40px;
            height: 40px;
            border-radius: 50px;
            overflow: hidden;
            border: 2px solid #f00;
            margin: 40px 100px;

            background: url(../fff/Ro0Ock.avif);
            background-size: 600px 400px;
            background-repeat: no-repeat;
            background-position: -216px -103px;
        }

        .sero{
            width: 100%;
            height: 2px;
            background-color: rgba(255, 0, 0, 0.5);
            margin-top: 20px; 
        }

        .garo{
            width: 2px;
            height: 100%;
            background-color: rgba(255, 0, 0, 0.5);
            margin-left: 19px; 
            margin-top: -22px; 
        }
        .dot{
            width: 6px;
            height: 6px;
            background: rgb(0, 255, 0);
            border-radius: 10px;
            margin-left: 17px;
            margin-top: -22px;
        }
    </style>
</head>
<body>
    <h1>08_back_work01</h1>

    <div class="one">
        <div class="zoom">
            <div class="sero"></div>
            <div class="garo"></div>
            <div class="dot"></div>
        </div>
        
    </div>
</body>
</html>
