<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05_sort</title>
    <style>
        td{
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <h1>05_sort</h1>
    <script>

        let num = [78,91,46,83,50,23,53,67,88,52,72,92,44]
        let arr = []
        let buf

        for(let i = 0; i < num.length; i++){
            if(num[i] >= 70){
                arr[arr.length] = num[i]
            }
        }

        document.write(`70점 이상 : ${arr} <br/>`)

        for(let i = 0; i < arr.length; i++){
            for(let j = i + 1; j < arr.length; j++){
                if(arr[i] > arr[j]){
                    buf = arr[i]
                    arr[i] = arr[j]
                    arr[j] = buf
                }
            }
        }

        document.write(`오름차순 정렬 : ${arr} <br/>`)
    </script>
</body>
</html>
