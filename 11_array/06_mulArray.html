<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>06_mulArray</title>
</head>
<body>
    <h1>06_mulArray</h1>
    <script>
        let arr = [                                             //1차원
            [         "0_0",     "0_1",    "0_2",      "0_3"],  //arr[0]
            [         "1_0",     "1_1",    "1_2",      "1_3"],  //arr[1]
            [         "2_0",     "2_1",    "2_2",      "2_3"]   //arr[2]
            // 2차원 arr[?][0], arr[?][1], arr[?][2], arr[?][3], 
        ]

        document.write(`arr : ${arr} => ${arr.length} <br/>`)
        document.write(`1차원 <br/>`)
        document.write(`arr[0] : ${arr[0]} => ${arr[0].length}<br/>`)
        document.write(`arr[1] : ${arr[1]} => ${arr[1].length}<br/>`)
        document.write(`arr[2] : ${arr[2]} => ${arr[2].length}<br/>`)
        
        document.write(`2차원 <br/>`)
        document.write(`arr[0][0] : ${arr[0][0]} <br/>`)
        document.write(`arr[1][2] : ${arr[1][2]} <br/>`)

        // 1. 입력부
        let studs = [
            ["기안팔사",72,77,78],
            ["기안팔오",52,57,58],
            ["기안팔육",92,97,98],
            ["기안팔칠",62,67,68],
            ["기안팔팔",82,87,88]
        ]

        let res =[]

        // 2. 연산부 - 합계, 평균
            // res[?][0], res[?][1]
        for (let p = 0; p < studs.length; p++){
            let tot = 0 // 각 학생마다 총점 초기화

            // studs[0][0] : 이름 - 과목 - 과목점수 합계 
            for (let i = 1; i < studs[p].length; i++){
                tot += studs[p][i]
            //studs[0][1]+studs[0][2]+studs[0][3]

            }
            let avg = tot/(studs[p].length-1)   
            // (studs[0].length-1) 배열갯수 이름 제외
            
        let back

            if(avg >= 90){
                back = "수"
            }else if(avg >= 80){
                back = "우"
            }else if(avg >= 70){
                back = "미"
            }else if(avg >= 60){
                back = "양"
            }else{
                back = "가"
            }

            res[p]= [tot, avg, back]  // 각 학생점수계산배열 대입
        }

    </script>

    <table border="">
        <tr>
            <td>이름</td>
            <td>국어</td>
            <td>영어</td>
            <td>수학</td>
            <td>총점</td>
            <td>평균</td>
            <td>등급</td>
        </tr>

        <tr>
        <script>

            // 3. 출력용
            for (let i = 0; i<studs.length; i++) {   // i = 각 학생 번호 : 0 1 2 3 4
                const st = studs[i]     //st : 각 학생 정보
                // i : 0 , studs[i] : ["기안팔사", 72, 77, 78]
                // st : ["기안팔사", 72, 77, 78]
                let ttt = `<tr>`
                    for (const e of st){    // e : 한 학생의 각 정보
                                            // st : ["기안팔사", 72, 77, 78]
                                            // e : "기안팔사"
                                            // e : 72
                                            // e : 77
                                            // e : 78

                        ttt += `<td>${e}</td>`
                    }
                        const rr = res[i]
                        //    rr = res[i]:[210:70]
                    for (const r of rr){    // e : 한 학생의 각 계산 정보
                        ttt += `<td>${r}</td>`
                        
                    }
                    ttt += `</tr>`

                document.write(ttt)
                    
            }
        </script>
        </tr>
    </table>
</body>
</html>
