<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09_keyPlayer</title>
</head>
<body>
    <h1>09_keyPlayer</h1>
    <script>
        let player = [
            {'name':'정우성','jum':67},
            {'name':'김태희','jum':76},
            {'name':'손지창','jum':91},
            {'name':'김무경','jum':65},
            {'name':'김성욱','jum':91},
            {'name':'정우성','jum':87},
            {'name':'김태희','jum':86},
            {'name':'손지창','jum':71},
            {'name':'김무경','jum':85},
            {'name':'김성욱','jum':71},
            {'name':'정우성','jum':77},
            {'name':'김태희','jum':96},
            {'name':'손지창','jum':61},
            {'name':'김무경','jum':95},
            {'name':'김성욱','jum':81}
        ]

        let result = [];

        for(let i = 0; i < player.length; i++){
            let p = player[i];
            let max = p.jum;
            let chk = false;

            for(let r of result){
                if(r.name == p.name){
                    chk = true;
                }
            }

            if(chk){
                continue;
            }

            for(let j = i + 1; j < player.length; j++){
                if(p.name == player[j].name){
                    if(max < player[j].jum){
                        max = player[j].jum;
                    }
                }
            }

            result.push({name:p.name, jum:max});
        }

        console.log(result);

        for(let rr of result){
            document.write(`${rr.name} : ${rr.jum}<br>`);
        }
</script>
</body>
</html>
