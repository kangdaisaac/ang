<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>09_keyPlayer</title>
</head>
<body>
    <h1>09_keyPlayer</h1>
    <script>
        let player = [
            {'name':'정우성','jum':67},
            {'name':'김태희','jum':76},
            {'name':'손지창','jum':91},
            {'name':'김무경','jum':65},
            {'name':'김성욱','jum':91},
            {'name':'정우성','jum':87},
            {'name':'김태희','jum':86},
            {'name':'손지창','jum':71},
            {'name':'김무경','jum':85},
            {'name':'김성욱','jum':71},
            {'name':'정우성','jum':77},
            {'name':'김태희','jum':96},
            {'name':'손지창','jum':61},
            {'name':'김무경','jum':95},
            {'name':'김성욱','jum':81}
        ];

        let result = {};

        for (const p of player) {
            if (result[p.name] == undefined) {
                result[p.name] = p.jum;
            } else if (result[p.name] < p.jum) {
                result[p.name] = p.jum;
            }
        }


        for (const k in result) {
            document.write(`${k} : ${result[k]}<br>`);
        }
    </script>
</body>
</html>
