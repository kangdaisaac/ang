<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>04_friend</title>
    <style>

        /*  
        + : 1개 연결
        ~ : 모든 연결
        */
        h3{
            color: #f00;
        }
        h3+h3+h3{ /*  h3 3번째 */
            background-color: #ff0;
        }
        h2+h3+h3+h3{ /* h2 이후 h3 3번째 */
            text-decoration: underline;
        }

        h4~h3{ /* h4 이후  모든 h3 */
            font-size: 30px;
        }

        h4+h4+h3+h3~h3{ /* h4 이후  모든 h3 */
            background-color: #f0f;
        }

        
    </style>
</head>
<body>
    <h1>04_friend</h1>
    <h3>h3 1</h3>
    <h3>h3 2</h3>
    <h3>h3 3</h3>
    <h3>h3 4</h3>
    <h3>h3 5</h3>
    <h3>h3 6</h3>
    
    <h2>h2</h2>
    <h3>h2...h3 1</h3>
    <h3>h2...h3 2</h3>
    <h3>h2...h3 3</h3>
    <h3>h2...h3 4</h3>
    <h3>h2...h3 5</h3>
    <h3>h2...h3 6</h3>

    <h4>h4 1</h4>
    <h4>h4 2</h4>
    <h4>h4 3</h4>
    <h4>h4 4</h4>
    <h3>h4...h3 1</h3>
    <h3>h4...h3 2</h3>
    <h3>h4...h3 3</h3>
    <h3>h4...h3 4</h3>
    <h3>h4...h3 5</h3>
    <h3>h4...h3 6</h3>
</body>
</html>
