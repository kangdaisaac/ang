<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01_style</title>
    <style>
        /* 
            style 지정하는 태그 
            ==> 디자인 속성을 설정
            style 주석 구간

            style 지정 방식 
            선택자 {
                속성명 : 속성값;
            }


            기본 선택자 종류
            
            1 태그 선택자 : div, span , img... 등등

            태그명 {
            }

            2 클래스선택자 : class="aaa"

            .클래스명{
            }

            3 id 선택자 : id = "ccc"

            #id명{
            }

            같은 속성이 중첩된 경우 우선순위

            id > class > tag


        아이디                  클래스
속성    Id="aaa"                Class="bbb"
style   #aaa                    .bbb
용도    중복되지 않도록 1회     여러번 중복 적용가능

        */
        div{
            border :   1px   solid #000;
                    /* 선두께 선종류 선색 */

            width : 100px;
            height : 100px;
            background-color: #ff0;
        }

        .aaa , .fff{ /* 2개의 선택자를 , 이용하여 설정 */
            background-color: #0f0;
        }

        .bbb{
            background-color: #0ff;
        }
        #ccc{
            background-color: #fa0;
        }
        .ddd{
            color: #3a3;
        }
        #eee{
            color: #3a3;
        }
    </style>
</head>
<body>
    <h1>01_style</h1>
    <div>box1</div>
    <div class="aaa">box2</div>
    <!--aaa ddd 클래스 2개 지정 -->
    <div class="aaa ddd" id="ccc">box3</div>
    <div class="bbb">box4</div>
    <div id="ccc">box5</div>
    <div id="eee">box6</div>
    <!--id 2개 지정불가 : 둘다 인식하지 못한다 -->
    <div id="ccc eee">box7</div>
    <div class="fff">box8</div>
</body>
</html>
