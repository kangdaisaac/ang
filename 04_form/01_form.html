<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01_form</title>
</head>
<body>
    <h1>01_form</h1>
    <!-- form 태그 안의 태그 내용만 action 페이지에 query 로 전달
         joinReg?pid=머시기&pw=거시기 
    -->
    <form action="jonReg">
        <input type="text" name="pid">
        <input type="text" name="pw">
        <input type="submit" value="로그인1">
    </form>

    <!-- form 안에 있지 않아 action으로 전달되지 않는다 -->
    <input type="text" name="nick">

    <!-- form 태그 안의 태그 내용만 action 페이지에 query 로 전달
         joinReg2?mid=머시기&age=거시기 
    -->

    <form action="jonReg2">
        <!-- table>tr*8>td+td>input[name]> -->
        <table border="">
            <tr>
                <td>아이디</td>
                <td><input type="text" name="mid" size="10" maxlength="6"
                    placeholder="아이디 입력"></td>
            </tr>
            <tr>
                <td>나이</td>
                <td><input type="number" name="age" value="26"></td>
            </tr>
            <tr>
                <td>암호</td>
                <td><input type="password" name="pw"></td>
            </tr>
            <tr>
                <td>생일</td>
                <td><input type="date" min="2000-01-01" max="2025-12-31" name="birth" value="2000-01-01"></td>
            </tr>
            <tr>
                <td>방문예정</td>
                <td><input type="datetime-local" name="reservation"></td>
            </tr>
            <tr>
                <td>복학</td>
                <td><input type="month" name="mm"></td>
            </tr>
            <tr>
                <td>이메일</td>
                <td>
                    <input type="email" name="ee">
                    <input type="button" value="중복확인">
                </td>
            </tr>
            <tr>
                <td>전화</td>
                <td><input type="tel" name="phone"></td>
            </tr>
            <tr>
                <td>맵기정도</td>
                <td><input type="range" name="sp" min="0" max="100" step="10" value="30"></td>
            </tr>
            <tr>
                <td>파일</td>
                <td><input type="file" name="upfile"></td>
            </tr>
            <tr>
                <td>성별</td>
                <td>
                    <input type="radio" value="m" name="gender">남
                    <input type="radio" value="f" name="gender" checked>여
                    <input type="radio" value="ex" name="gender" checked>포크레인   
                    <!-- checked 마지막 것 체크 -->           
                </td>
            </tr>
            <tr>
                <td>취미</td>
                <td>
                    <input type="checkbox" name="hobby" value="baseball">야구
                    <input type="checkbox" name="hobby" value="bike" checked>바이크
                    <input type="checkbox" name="hobby" value="coding" checked>코딩
                    <!-- checked 모두 체크 -->
                </td>
            </tr>
            <tr>
                <td>직업</td>
                <td><select name="job">
                        <option value="do">의사</option>
                        <option value="gw">장의사</option>
                        <option value="po">변호사</option>
                        <option value="jj" selected>오늘은내가짜파게티요리사</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>남길 말</td>
                <!-- textarea 의 텍스트 노드는 띄어쓰기 줄바꿈 평서문 형태로 작성 -->
                <td>
                    <textarea cols="50" rows="5" name="mal">
                ╔╦╦╦═╦╗╔═╦═╦══╦═╗
                ║║║║╩╣╚╣═╣║║║║║╩╣
                ╚══╩═╩═╩═╩═╩╩╩╩═╝
                    </textarea>
            </tr>
            <tr>
                <td></td>
                <td><input type="text" name=""></td>
            </tr><tr>
                <td></td>
                <td><input type="text" name=""></td>
            </tr>
            <tr>
                
                <td colspan="2" align="center">
                    <input type="submit" value="로그인2">
                    <input type="reset" value="초기화">
                    <button>이것또한 로그인2</button>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
