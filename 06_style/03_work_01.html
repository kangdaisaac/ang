<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03_work_01</title>

<style>
*{
    margin: 0;
    padding: 0;
}

.wrapper{
    width: 500px;
    height: 800px;
    border: 1px solid #000;
    margin: 0px auto;
    background: linear-gradient(
        135deg, 
        rgba(125,126,125,1) 0%,
        rgba(125,126,125,1) 29%,
        rgba(125,126,125,1) 40%,
        rgba(14,14,14,1) 100%);
}

.content{
    width: 100%;
    margin-top: 200px;   
    text-align: center;
}

.box{
    width: 400px;
    height: 70px;
    margin: 10px auto;
    padding: 10px;
    color: #fff;
}

.word1{
    opacity: 0.5;       /* 투명도 : 0 (투명) < x < 1 (불투명)*/
    color: rgb(209, 209, 209);
}

.cc1{
    width: 121px;
    height: 121px;
    border-radius: 100px;
    float: left;
    margin: 15px;
    text-align: center;
    line-height: 120px;
    background-color: #fff;
}

.cc2{
    box-sizing: border-box;
    width: 120px;
    height: 120px;
    border: 2px solid #fff;
    border-radius: 60px;
    float: left;
    margin: 15px;
    text-align: center;
    line-height: 120px;
    color: #fff;
}

.bw{
    width: 305px;
    margin: 20px auto;
    font-size: 18px;
}

</style>
</head>

<body>

<h1>03_work_01</h1>

<div class="wrapper">

    <div class="content">
        
        <div class="box word1">
            to enter this site, you need to be of <br/>
            legal drinking age in your county
        </div>

        <div class="box word2">
            <h2>ARE YOU OF LEGAL PURCHASE <br/> AGE FOR ALCOHOL?</h2>
        </div>

        <div class="bw">
            <div class="cc1">Yes</div>
            <div class="cc2">No</div>
        </div>

    </div>

</div>

</body>
</html>
