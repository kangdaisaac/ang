<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05_font_work01</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=East+Sea+Dokdo&family=Gaegu&family=Permanent+Marker&family=Playwrite+DK+Uloopet+Guides&display=swap" rel="stylesheet">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        .wrapper{
            width: 94vw;
            margin: 0 auto;
            padding-top: 1vh;
        }

        .head{
            width: 100%;
            text-align: center;
            margin-bottom: 1vh;
        }

        .logo{
            font-family: "Permanent Marker", cursive;
            font-size: 2.8vw;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1vh;
        }

        .menu{
            width: 50vw;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
        }

        .menu .item{
            width: 10vw;
            text-align: center;
            font-size: 1vw;
            color: #333;
        }

        .menu .item img{
            display: block;
            width: 2.2vw;
            margin: 0 auto 0.5vh;
        }

        .menu .item:first-child{
            color: #b67a68;
            border-bottom: 0.2vh solid #f00;
            padding-bottom: 0.4vh;
        }

        img{
            display: block;
            width: 100%;
        }

        .section1{
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: 1.5vh;
            margin-bottom: 1.5vh;
        }

        .mainBanner{
            width: 79%;
        }

        .rightSide{
            width: 19%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .rightSide img:first-child{
            margin-bottom: 1vh;
        }

        .section2{
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5vh;
        }

        .leftCol{
            width: 48%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .leftCol img:first-child{
            margin-bottom: 1.5vh;
        }

        .rightCol{
            width: 48%;
        }

        .bottomBanner{
            width: 100%;
            margin-bottom: 1vh;
        }
    </style>
</head>
<body>
    <h1>05_font_work01</h1>
    <div class="wrapper">

        <div class="head">
            <div class="logo">Alfredo <br> Gonzales</div>

            <div class="menu">
                <div class="item">
                    <img src="../fff/font/menu01.png" alt="">
                    Home
                </div>
                <div class="item">
                    <img src="../fff/font/menu02.png" alt="">
                    Shop
                </div>
                <div class="item">
                    <img src="../fff/font/menu03.png" alt="">
                    Custombox
                </div>
                <div class="item">
                    <img src="../fff/font/menu04.png" alt="">
                    Blog
                </div>
                <div class="item">
                    <img src="../fff/font/menu05.png" alt="">
                    Story
                </div>
            </div>
        </div>

        <div class="section1">
            <div class="mainBanner">
                <img src="../fff/font/header01.jpg" alt="">
            </div>

            <div class="rightSide">
                <img src="../fff/font/side01.jpg" alt="">
                <img src="../fff/font/side02.png" alt="">
            </div>
        </div>

        <div class="section2">
            <div class="leftCol">
                <img src="../fff/font/banner_01.jpg" alt="">
                <img src="../fff/font/video.jpg" alt="">
            </div>

            <div class="rightCol">
                <img src="../fff/font/banner_02.jpg" alt="">
            </div>
        </div>

        <div class="bottomBanner">
            <img src="../fff/font/banner_03.jpg" alt="">
        </div>

    </div>
</body>
</html>
