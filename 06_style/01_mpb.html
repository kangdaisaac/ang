<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>01_mpb</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    .wrapper{
        width: 1000px;
        height: 400px;
        background-color: #ffb;
        margin: 10px;
    }
    .box{
        width: 100px;
        height: 100px;
        background-color: #afb;
        float: left;        
    }
    .mm1{
        margin: 50px 10px 30px 20px;
              /* 위   우   하    좌 */
    }
    .mm2{
        margin-top: 50px;
        margin-right: 10px;
        margin-bottom: 30px;
        margin-left: 20px;
    }
    .mm3{
        margin-left: 20px;
    }
    .mm4{
        margin: 50px;
        margin-top: 10px;
    }
    .pp1{
        padding: 50px 10px 30px 20px;
              /* 위   우   하    좌 */
        border: 1px solid #ccc;
    }
    .pp2{
        padding-top: 50px;
        padding: 10px;
        padding-bottom: 30px;
        padding-left: 20px;
        border: 1px solid #ccc;
    }
    .pp3{
        padding-left: 2ppx;
        border: 1px solid #ccc;

    }
    .pp4{
        padding: 50px;
        padding-top: 10px;
        border: 1px solid #ccc;
    }
    .bb1{
       border: 5px solid #f66;
       margin: 10px;
    }
    .bb2{
        /* border: 5px 1px 3px 2px solid #f66; 불가 */
        border-top: 5px solid #f66;
        border-right: 10px solid #66f;
        border-bottom: 3px solid #6f6;
        border-left: 2px solid #f6f;
        margin: 10px;
    }
    .bb3{
        border-top: 5px solid #f66;
        border-right: 10px dotted #66f;
        border-bottom: 10px dashed #6f6;
        border-left: 10px double #f6f;
        margin: 10px;
    }
    .bb4{
        border-top: 10px groove #f66;
        border-right: 10px inset #66f;
        border-bottom: 10px ridge #6f6;
        border-left: 10px outset #f6f;
        margin: 10px;
    }
    .rr1{
        border-radius: 30px;
        margin: 10px;
    }
    .rr2{
        border-radius: 50px 20px;
                    /* ↖↘   ↗↙ */
        margin: 10px;
    }
    .rr3{
        border-radius: 30px 50px 20px 10px;
                    /*  ↖   ↗    ↘    ↙  */
        margin: 10px;
    }
    .rr4{
        border-top-left-radius: 30px; 
        border-top-right-radius: 50px;
        border-bottom-right-radius: 20px;   
        border-bottom-left-radius: 10px;
        /*  ↖   ↗    ↘    ↙  */ 
        margin: 10px;
    }
    
</style>
<body>
    <h1>01_mpb</h1>
    <h2>margin</h2>
    <div class="wrapper">
        <div class="box mm1">마진1</div>
        <div class="box mm2">마진2</div>
        <div class="box mm3">마진3</div>
        <div class="box mm4">마진4</div>
    </div>

    <h2>padding</h2>
    <div class="wrapper">
        <div class="box pp1">패딩1</div>
        <div class="box pp2">패딩2</div>
        <div class="box pp3">패딩3</div>
        <div class="box pp4">패딩4</div>
    </div>
    
    <h2>border</h2>
    <div class="wrapper">
        <div class="box bb1">보더1</div>
        <div class="box bb2">보더2</div>
        <div class="box bb3">보더3</div>
        <div class="box bb4">보더4</div>
    </div>
    
    <h2>radius</h2>
    <div class="wrapper">
        <div class="box rr1">라운드1</div>
        <div class="box rr2">라운드2</div>
        <div class="box rr3">라운드3</div>
        <div class="box rr4">라운드4</div>
    </div>
</body>
</html>
