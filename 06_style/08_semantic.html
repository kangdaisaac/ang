<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>08_semantic</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        wrapper{
            width: 800px;
            height: 1000px;
            background-color: #ffa;
            display: block;
        }

        header, nav, aside, section, main, figure, footer, address{
            border: 1px solid #333;
            margin: 20px;
            padding: 20px;

        }

        aside{
            width: 200px;
            height: 200px;
            float: left;
        }

        main{
            width: 400px;
            height: 400px;
            float: right;
        }

        footer{
            clear: both;
        }
    </style>
</head>
<body>
    <h1>08_semantic</h1>
    <wrapper>
        <header> 헤더
            <nav>네비게이션</nav>
        </header>
        <aside>측면</aside>
        <main>
            메인
            <article>글내용</article>
            <section>
                섹션
                <figure>
                    <img src="../fff/다운로드 (3).jpg" width="200px" alt="">
                    <figcaption>그림설명</figcaption>
                </figure>
            </section>
        </main>
        <footer>
            푸터
            <address>주소</address>
        </footer>
    </wrapper>
</body>
</html>
