        document.write("<h2>2.3 논리 연산자 </h2>")
        /*
        항  :    boolean
        결과 :   boolean 

                숫자        문자열
        true    0 제외      "" 제외
        false   0          ""(blank)
        
        !   not - 1항 연산

        document.write("<h2>2.5 비트 연산자 </h2>")
        /*
        항  :    숫자
        결과 :   숫자 

        5 : 0101 (2)

            5
            2   ---  1
            1   ---  0


            2 -> 10
            0   1   0   1
            2^3 2^2 2^1 2^0
            0 + 4 + 0 + 1

        0: false 1: true
        5: 0101(2)
        6: 0110(2)
    ------------------
    &(and)  0100    -> 4
    |(or)   0111    -> 7
    ^(Xor)  0011    -> 3
    Xor : 두 항이 다르면 true
        */
        a = 5; b = 6;
        document.write(`a & b : ${a & b}<br/>`)        
        document.write(`a & b : ${a | b}<br/>`)        
        document.write(`a & b : ${a ^ b}<br/>`)        



        document.write("<h2>2.6 시프트 연산자 </h2>")
        /*
            항  :    숫자
            결과 :   숫자 

            6: 0110(2)

            6 >> 2
    2개추가  00 0110
    2개삭제  00 01 10
                    -- 삭제
            0001    : 1
    
            6 << 2
    2개추가  0110 00 : 24
                
    

            0000 0000   0      0   0000 0000 0000 0000
            0000 0001   1      1   0000 0000 0000 0001
            0000 0010   2      2   0000 0000 0000 0010
            0000 0011   0      0   0000 0000 0000 0011
                        ......
            0111 1110   126    126 0000 0000 0111 1110
            0111 1111   127    127 0000 0000 0111 1111
            1000 0000  -128    128 0000 0000 1000 0000
            1000 0001  -127    129 0000 0000 1000 0001
            1111 1101  -3      253 0000 0000 1111 1101
            1111 1110  -2      254 0000 0000 1111 1110
            1111 1111  -1      255 0000 0000 1111 1111
          1 0000 0000   0      256 0000 0001 0000 0000

           -6
              1111 1010
           -6 >> 2 (부호에 맞추어 추가 : 양수 0, 음수 1) 
    2개추가 11 1111 1010
    2개제거 11 1111 10 10
           1111 1110    

           4byte
           -6
           1111 1111 1111 1111 1111 1111 1111 1010

           >>> : 부호와 상관없이 0 갯수 추가
           -6 >>> 2      
           2개 추가 00 1111 1111 1111 1111 1111 1111 1111 10 10
           2개 제거 00 1111 1111 1111 1111 1111 1111 1111 10


           1073741822
           0011 1111 1111 1111 1111 1111 1111 1110

    */

        document.write(`6 >> 2 : ${6 >> 2}<br/>`) 
        document.write(`6 << 2 : ${6 << 2}<br/>`) 
        document.write("<br/>")        
        document.write(`-6 >> 2 : ${-6 >> 2}<br/>`)
        document.write(`6 >>> 2 : ${6 >>> 2}<br/>`)
        document.write(`-6 >>> 2 : ${-6 >>> 2}<br/>`)

            조건의 값에 따라 2번째, 3번째 항을 분기하여 리턴
        */

        document.write(`true ? '참깨라면' : '거어짓' ==> ${true ? '참깨라면' : '거어짓'} <br/>`)
        document.write(`true ? '참깨라면' : '거어짓' ==> ${false ? '참깨라면' : '거어짓'} <br/>`)
        

var jum = 27
