<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02_sonTemp</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .wrapper{
            width: 800px;
            height: 600px;
            background-color: #ffa;
            margin: 0 auto;
        }

        .wrapper > div { /* header 역할 */
            width: 100%; /* 부모 크기대비 %로 지정*/
            height: 80px;
            background-color: #faf;           
        }

        .wrapper > div > div{
            width: 100px;
            height: 100%;
            line-height: 80px;
            font-size: 40px;
            background-color: #afa;
            float: left;
            margin-left: 30px;
        }
        
        .wrapper > div > ul{
            margin-top: 40px;
            margin-right: 30px;
            width: 400px;
            height: 40px;
            line-height: 40px;
            font-size: 20px;
            background-color: #afa;
            float: right;
            display: flex;
            justify-content: space-between;
        }

        .wrapper li{
            list-style: none;
        }

        .wrapper > span{
            width: 100%;
            height: 520px;
            background-color: #aaf;
            clear: both;
            display: block;
        }
        span > ul{  /* 자식/후손 선택자를 중간 선택자에서 사용 가능 */
            margin-left: 30px;
            width: 100px;
            height: 100%;
            background-color: #faa;
            float: left;
        }
        span > ul > li{
            width: 80px;
            height: 40px;
            margin-top: 5px;
            background-color: #aff;
            text-align: center;
            line-height: 40px
        }

        .wrapper > span > div{
            width: 670px;
            height: 100%;
            background-color: #ffa;
            float: left;
        }
    </style>
</head>
<body>
    <h1>02_sonTemp</h1>
    <div class="wrapper">
        <div>
            <div>로고</div>
            <ul>
                <li>회원가입</li>
                <li>로그인</li>
                <li>마이페이지</li>
                <li>고객센터</li>
            </ul>
        </div>
        <span>
            <ul>
                <li>회사소개</li>
                <li>제품</li>
                <li>갤러리</li>
                <li>고객센터</li>
            </ul>
            <div>메인페이지입니다</div>
        </span>
    </div>
</body>
</html>
