<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>05_diary01</title>
    <style>
        *{ /* 슈퍼 노가다 버전 -> div 반복으로 위치 지정 */ 
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .wrapper{
            width: 400px;
            margin: 20px;
            border: 2px solid #000;
        }

        .img_box img{
            width: 350px;
            display: block;
        }

        .wrapper h2{
            text-align: center;
            padding: 20px;
            border-top: 1px solid #000;
            border-bottom: 1px solid #000;
        }

        /* 달력 전체 */
        .wrapper h2~div{
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        /* 모든 칸 */
        .wrapper h2~div div{
            box-sizing: border-box;
            border: 1px solid #000;
            height: 50px;
            padding: 8px;
            color: #000;
            text-align: center;
        }

        /* 8번째부터 날짜 오른쪽 정렬 */
        .wrapper h2~div
        div+div+div+div+div+div+div+div{
            text-align: right;
        }

        /* 1번째 : 일요일 */
        .wrapper h2~div div{
            background-color: #f00;
            color: #fff;
        }
        .wrapper h2~div div~div{
            background-color: #fff;
            color: #000;
        }

        /* 7번째 : 토요일 */
        .wrapper h2~div
        div+div+div+div+div+div+div{
            background-color: #00f;
            color: #fff;
        }
        .wrapper h2~div
        div+div+div+div+div+div+div~div{
            background-color: #fff;
            color: #000;
        }

        /* 14번째 : 4  (토요일) */
        .wrapper h2~div
        div+div+div+div+div+div+div
        +div+div+div+div+div+div+div{
            color: #00f;
        }
        .wrapper h2~div
        div+div+div+div+div+div+div
        +div+div+div+div+div+div+div~div{
            color: #000;
        }

        /* 15번째 : 5  (일요일) */
        .wrapper h2~div
        div+div+div+div+div+div+div
        +div+div+div+div+div+div+div
        +div{
            color: #f00;
        }
        .wrapper h2~div
        div+div+div+div+div+div+div
        +div+div+div+div+div+div+div
        +div~div{
            color: #000;
        }
